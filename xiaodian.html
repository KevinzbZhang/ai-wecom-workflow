const NS='http://www.w3.org/2000/svg';
const svg=document.getElementById('canvas');
const wrap=document.getElementById('wrap');
let scale=1;
let canvasW=2400, canvasH=5000;

// ========== 缩放 ==========
function setScale(s){
  scale=Math.max(0.2,Math.min(3,s));
  svg.setAttribute('width', Math.ceil(canvasW*scale));
  svg.setAttribute('height', Math.ceil(canvasH*scale));
  document.getElementById('zoomInfo').textContent=Math.round(scale*100)+'%';
}
function zoomIn(){setScale(scale+0.15)}
function zoomOut(){setScale(scale-0.15)}
function zoomReset(){setScale(1);wrap.scrollTop=0;wrap.scrollLeft=0;}
function fitScreen(){
  const sw=wrap.clientWidth,sh=wrap.clientHeight;
  setScale(Math.min(sw/canvasW,sh/canvasH)*0.95);
  wrap.scrollTop=0;wrap.scrollLeft=0;
}
wrap.addEventListener('wheel',e=>{
  if(e.ctrlKey||e.metaKey){
    e.preventDefault();
    const rect=wrap.getBoundingClientRect();
    const mx=e.clientX-rect.left, my=e.clientY-rect.top;
    const oldScale=scale;
    const newScale=Math.max(0.2,Math.min(3,scale+(e.deltaY<0?0.08:-0.08)));
    const lx=(wrap.scrollLeft+mx)/oldScale;
    const ly=(wrap.scrollTop+my)/oldScale;
    setScale(newScale);
    wrap.scrollLeft=lx*scale-mx;
    wrap.scrollTop=ly*scale-my;
  }
},{passive:false});

function autoH(textLines, minH){
  const lines=Array.isArray(textLines)?textLines:[textLines];

}

  ['s5_adjust','s5','优化后',{dir:'left',path:'up'}],
  ['s5_d','s_low','客户沉默/\n想停投',{dir:'right'}],

  // ─── S6 引导ADQ ───
  ['s6','s6_talk_from_shop','从小店引导',{dir:'left'}],
  ['s6','s6_talk_from_direct','非小店引导',{dir:'right'}],
  ['s6_talk_from_shop','s6_d','',{dir:'bottom'}],
  ['s6_talk_from_direct','s6_d','',{dir:'bottom'}],
  ['s6_d','s7','开户成功',{dir:'bottom'}],
  ['s6_d','s6_wait','暂不考虑',{dir:'left'}],
  ['s6_wait','s6_d','再次引导',{dir:'bottom',path:'up'}],

  // ─── S7 开户未充值 ───
  ['s7','s7_talk'],['s7_talk','s7_train'],['s7_train','s7_d'],
  ['s7','s7_login','',{dir:'left'}],
  ['s7_d','s8','充值并开始投放',{dir:'bottom'}],
  ['s7_d','s7_stuck','仍未行动',{dir:'left'}],
  ['s7_stuck','s7_d','跟进后',{dir:'bottom',path:'up'}],

  // ─── S8 ADQ在投 ───
  ['s8','s8_talk'],['s8_talk','s8_extra'],['s8_extra','s8_d'],
  ['s8_d','end_ok','效果稳定',{dir:'right'}],
  ['s8_d','s_low','想停投/沉默',{dir:'right',path:'curve'}],

  // ─── 低意向跟进 ───
  ['s_low','s_low_talk'],['s_low_talk','s_low_d'],
  ['s_low_d','s5','是（回到投放）',{dir:'left',path:'up'}],
  ['s_low_d','end_low','仍沉默',{dir:'bottom'}],
];

// ================================================================
//  绘图引擎（与线索婚介一致）
// ================================================================
function ce(t){return document.createElementNS(NS,t)}

function drawRect(x,y,w,h,fill,stroke,r=6,dash=false){
  const rect=ce('rect');
  rect.setAttribute('x',x-w/2);rect.setAttribute('y',y-h/2);
  rect.setAttribute('width',w);rect.setAttribute('height',h);
  rect.setAttribute('rx',r);rect.setAttribute('ry',r);
  rect.setAttribute('fill',fill);rect.setAttribute('stroke',stroke);rect.setAttribute('stroke-width','2');
  if(dash)rect.setAttribute('stroke-dasharray','5,3');
  return rect;
}

function drawDiamond(x,y,s,fill,stroke){
  const d=ce('polygon');
  d.setAttribute('points',`${x},${y-s/2} ${x+s/2+10},${y} ${x},${y+s/2} ${x-s/2-10},${y}`);
  d.setAttribute('fill',fill);d.setAttribute('stroke',stroke);d.setAttribute('stroke-width','2');
  return d;
}

function drawText(x,y,lines,size=11,color='#1e293b',weight='normal'){
  const g=ce('g');
  if(typeof lines==='string')lines=[lines];
  const startY=y-((lines.length-1)*LINE_H)/2;
  lines.forEach((l,i)=>{
    const t=ce('text');t.setAttribute('x',x);t.setAttribute('y',startY+i*LINE_H);
    t.setAttribute('text-anchor','middle');t.setAttribute('font-size',size);
    t.setAttribute('fill',color);t.setAttribute('font-weight',weight);
    t.textContent=l;g.appendChild(t);
  });
  return g;
}

function getBox(NN,id){
  const n=NN[id];if(!n)return null;
  if(n.type==='decision'){
    const hs=n.s/2+10,vs=n.s/2;
    return{x:n.x,y:n.y,top:{x:n.x,y:n.y-vs},bottom:{x:n.x,y:n.y+vs},left:{x:n.x-hs,y:n.y},right:{x:n.x+hs,y:n.y}};
  }
  const w=n.w||140,h=n._h||n.h||40;
  return{x:n.x,y:n.y,top:{x:n.x,y:n.y-h/2},bottom:{x:n.x,y:n.y+h/2},left:{x:n.x-w/2,y:n.y},right:{x:n.x+w/2,y:n.y}};
}

function preprocess(NN){
  Object.values(NN).forEach(n=>{
    if(n.type==='stage') n._h=autoH(n.text, 40);
    else if(n.type==='talk') n._h=autoH(n.text, 40);
    else if(n.type==='end') n._h=n.h||36;
  });
}

function render(NN,EE){
  preprocess(NN);
  svg.innerHTML='';

  const MARGIN=60;
  let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
  Object.values(NN).forEach(n=>{
    const w=n.w||((n.s||70)+20), h=n._h||n.h||(n.s||70);
    const l=n.x-w/2, r=n.x+w/2, t=n.y-h/2, b=n.y+h/2;
    if(l<minX)minX=l; if(r>maxX)maxX=r;
    if(t<minY)minY=t; if(b>maxY)maxY=b;
  });
  const offsetX=-minX+MARGIN, offsetY=-minY+MARGIN;
  const totalW=maxX-minX+MARGIN*2, totalH=maxY-minY+MARGIN*2;

  canvasW=totalW; canvasH=totalH;
  svg.setAttribute('viewBox',`0 0 ${totalW} ${totalH}`);
  svg.setAttribute('width', Math.ceil(totalW*scale));
  svg.setAttribute('height', Math.ceil(totalH*scale));
  svg.style.display='block';

  const root=ce('g');
  root.setAttribute('transform',`translate(${offsetX},${offsetY})`);

  // defs
  const defs=ce('defs');
  ['#64748b','#16a34a','#dc2626','#6a1b9a','#d97706','#0277bd','#e65100','#78909c'].forEach(c=>{
    const m=ce('marker');
    m.setAttribute('id','a'+c.replace('#',''));m.setAttribute('viewBox','0 0 10 10');
    m.setAttribute('refX','10');m.setAttribute('refY','5');
    m.setAttribute('markerWidth','7');m.setAttribute('markerHeight','7');
    m.setAttribute('orient','auto');
    const p=ce('path');p.setAttribute('d','M0,0 L10,5 L0,10 z');p.setAttribute('fill',c);
    m.appendChild(p);defs.appendChild(m);
  });
  svg.appendChild(defs);

  // 连线
  const edgeGroup=ce('g');
  EE.forEach(e=>{
    const fromId=e[0],toId=e[1],label=e[2]||'',opts=e[3]||{};
    const from=getBox(NN,fromId),to=getBox(NN,toId);
    if(!from||!to)return;
    let p1,p2;const dir=opts.dir||'bottom';
    if(dir==='bottom'){p1=from.bottom;p2=to.top;}
    else if(dir==='right'){p1=from.right;p2=to.left||to.top;}
    else if(dir==='left'){p1=from.left;p2=to.right||to.top;}
    else if(dir==='top'){p1=from.top;p2=to.bottom;}
    if(!p2)p2=to.top;

    const g=ce('g');const path=ce('path');let d;const mc='#64748b';
    if(dir==='bottom'&&Math.abs(p1.x-p2.x)<3){
      d=`M${p1.x},${p1.y} L${p2.x},${p2.y}`;
    }else if(dir==='bottom'){
      const my=(p1.y+p2.y)/2;
      d=`M${p1.x},${p1.y} L${p1.x},${my} L${p2.x},${my} L${p2.x},${p2.y}`;
    }else if(dir==='right'||dir==='left'){
      if(opts.path==='curve'){
        const mx=(p1.x+p2.x)/2;
        d=`M${p1.x},${p1.y} C${mx},${p1.y} ${mx},${p2.y} ${p2.x},${p2.y}`;
      }else if(opts.path==='up'||Math.abs(p1.y-p2.y)>20){
        const mx=(p1.x+p2.x)/2;
        d=`M${p1.x},${p1.y} L${mx},${p1.y} L${mx},${p2.y} L${p2.x},${p2.y}`;
      }else{
        d=`M${p1.x},${p1.y} L${p2.x},${p2.y}`;
      }
    }else{d=`M${p1.x},${p1.y} L${p2.x},${p2.y}`;}

    path.setAttribute('d',d);path.setAttribute('fill','none');
    path.setAttribute('stroke',mc);path.setAttribute('stroke-width','1.5');
    path.setAttribute('marker-end','url(#a64748b)');
    g.appendChild(path);

    if(label){
      const lx=(p1.x+p2.x)/2,ly=(p1.y+p2.y)/2;
      const lines=label.split('\n');
      const bw=Math.max(...lines.map(l=>l.length))*7+14;
      const bh=lines.length*13+6;
      const bg=ce('rect');
      bg.setAttribute('x',lx-bw/2);bg.setAttribute('y',ly-bh/2);
      bg.setAttribute('width',bw);bg.setAttribute('height',bh);
      bg.setAttribute('fill','#fff');bg.setAttribute('rx','3');
      g.appendChild(bg);
      lines.forEach((line,i)=>{
        const t=ce('text');t.setAttribute('x',lx);t.setAttribute('y',ly-((lines.length-1)*13)/2+i*13+1);
        t.setAttribute('text-anchor','middle');t.setAttribute('font-size','10');
        t.setAttribute('fill','#64748b');t.setAttribute('font-weight','500');
        t.textContent=line;g.appendChild(t);
      });
    }
    edgeGroup.appendChild(g);
  });
  root.appendChild(edgeGroup);

  // 节点
  const nodeGroup=ce('g');
  Object.entries(NN).forEach(([id,n])=>{
    const g=ce('g');g.setAttribute('id','node_'+id);
    if(n.type==='stage'){
      g.appendChild(drawRect(n.x,n.y,n.w,n._h,n.color,n.color,8));
      g.appendChild(drawText(n.x,n.y+1,[n.text],12,'#fff','700'));
    }else if(n.type==='talk'){
      g.appendChild(drawRect(n.x,n.y,n.w,n._h,'#f0fdf4','#16a34a',6));
      g.appendChild(drawText(n.x,n.y+1,n.text,10.5,'#15803d','500'));
    }else if(n.type==='decision'){
      g.appendChild(drawDiamond(n.x,n.y,n.s,'#fffbeb','#d97706'));
      g.appendChild(drawText(n.x,n.y+1,n.text,11,'#92400e','600'));
    }else if(n.type==='end'){
      const h=n._h||n.h||36;
      g.appendChild(drawRect(n.x,n.y,n.w,h,'#fff',n.color,16,true));
      g.appendChild(drawText(n.x,n.y+1,n.text,11,n.color,'700'));
    }
    nodeGroup.appendChild(g);
  });
  root.appendChild(nodeGroup);

  svg.appendChild(root);
}

render(N,E);
</script>
